services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vector_ecm
      POSTGRES_PASSWORD: vector_ecm
      POSTGRES_DB: vector_ecm
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector_ecm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
